<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Developer Coference</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Nav Bar Start  -->
    <header class="nav-bar">
      <nav class="nav-item">
        <img src="./assets/logo.png" alt="company-logo" />
        <ul>
          <li>Speakers</li>
          <li>Schedule</li>
          <li>Tracks</li>
          <li>Venue</li>
          <li>Blog</li>
        </ul>
        <button class="common-btn">Register Now</button>
      </nav>
    </header>
    <!-- Nav Bar End  -->
    <!-- Hero /banner Section Start  -->
    <section class="banner">
      <div class="overlay"></div>
      <div class="banner-content">
        <h1>Code. <em>Connect</em>. Create</h1>
        <p>
          Join 4,000+ engineers, founders, and builders at the premier developer
          conference of 2026. Three days of cutting-edge talks, hands-on
          workshops, and meaningful connections.
        </p>
        <button
          style="margin-top: 250px; width: 250px; align-items: center"
          class="common-btn"
        >
          Register Now
        </button>
      </div>
    </section>
    <!-- Hero /banner Section End  -->
